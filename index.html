<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Before I Forget - Prototype</title>
    <link rel="stylesheet" href="style.css" />
    <script src="libraries/p5.min.js"></script>
  </head>
  <body>
    <div id="main-container">
      <div id="canvas-holder"></div>

      <div id="chat-box">
        <div id="npc-header">
          <span id="npc-name">System</span>
        </div>
        <div id="dialogue-container">
          <p id="dialogue-text">
            Use Arrow Keys to move. Walk into items to interact.
          </p>
        </div>
        <div id="options-container" style="display: none">
          <button id="btn-yes" onclick="handleChoice('yes')">YES</button>
          <button id="btn-no" onclick="handleChoice('no')">NO</button>
        </div>
      </div>
    </div>

    <script src="src/WorldLevel.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
